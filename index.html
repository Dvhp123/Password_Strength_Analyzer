<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:700px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.meter{
    width:100%;
    height:12px;
    background:#334155;
    border-radius:10px;
    overflow:hidden;
    margin:15px 0;
}

.bar{
    height:100%;
    width:0%;
    transition:.4s;
}

.result{
    margin-top:15px;
}

.result p{
    margin:8px 0;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #475569;
    padding:10px;
    text-align:center;
}

table th{
    background:#334155;
}

.weak{
    color:red;
}

.medium{
    color:orange;
}

.strong{
    color:#22c55e;
}

.verystrong{
    color:#16a34a;
}
</style>
</head>
<body>

<div class="container">

    <h1>🔐 Password Strength Analyzer</h1>

    <input
        type="password"
        id="password"
        placeholder="Enter Password">

    <div class="meter">
        <div class="bar" id="bar"></div>
    </div>

    <div class="result">
        <h3 id="strength">Start Typing...</h3>

        <p id="length">❌ Minimum 8 Characters</p>
        <p id="upper">❌ Uppercase Letter</p>
        <p id="lower">❌ Lowercase Letter</p>
        <p id="number">❌ Number</p>
        <p id="special">❌ Special Character</p>

        <p id="score">Score : 0/5</p>
    </div>

    <button onclick="savePassword()">
        Submit
    </button>

    <table>
        <thead>
            <tr>
                <th>Password</th>
                <th>Strength</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody id="savedData">
        </tbody>
    </table>

</div>

<script>

let currentStrength = "";
let currentScore = 0;

document.getElementById("password")
.addEventListener("input", analyzePassword);

function analyzePassword(){

    const password =
    document.getElementById("password").value;

    let score = 0;

    const hasLength = password.length >= 8;
    const hasUpper = /[A-Z]/.test(password);
    const hasLower = /[a-z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

    if(hasLength) score++;
    if(hasUpper) score++;
    if(hasLower) score++;
    if(hasNumber) score++;
    if(hasSpecial) score++;

    currentScore = score;

    document.getElementById("length").innerHTML =
    (hasLength ? "✅" : "❌") + " Minimum 8 Characters";

    document.getElementById("upper").innerHTML =
    (hasUpper ? "✅" : "❌") + " Uppercase Letter";

    document.getElementById("lower").innerHTML =
    (hasLower ? "✅" : "❌") + " Lowercase Letter";

    document.getElementById("number").innerHTML =
    (hasNumber ? "✅" : "❌") + " Number";

    document.getElementById("special").innerHTML =
    (hasSpecial ? "✅" : "❌") + " Special Character";

    document.getElementById("score").innerHTML =
    "Score : " + score + "/5";

    const strength =
    document.getElementById("strength");

    const bar =
    document.getElementById("bar");

    if(password.length === 0){
        strength.innerHTML = "Start Typing...";
        bar.style.width = "0%";
        currentStrength = "";
        return;
    }

    if(score <= 1){
        currentStrength = "Weak";
        strength.innerHTML = "🔴 Weak";
        strength.className = "weak";
        bar.style.width = "20%";
        bar.style.background = "red";
    }
    else if(score <= 3){
        currentStrength = "Medium";
        strength.innerHTML = "🟠 Medium";
        strength.className = "medium";
        bar.style.width = "60%";
        bar.style.background = "orange";
    }
    else if(score === 4){
        currentStrength = "Strong";
        strength.innerHTML = "🟢 Strong";
        strength.className = "strong";
        bar.style.width = "80%";
        bar.style.background = "#22c55e";
    }
    else{
        currentStrength = "Very Strong";
        strength.innerHTML = "🟢 Very Strong";
        strength.className = "verystrong";
        bar.style.width = "100%";
        bar.style.background = "#16a34a";
    }
}

function savePassword(){

    const password =
    document.getElementById("password").value;

    if(password === ""){
        alert("Enter a password first");
        return;
    }

    const row = `
        <tr>
            <td>${password}</td>
            <td>${currentStrength}</td>
            <td>${currentScore}/5</td>
        </tr>
    `;

    document.getElementById("savedData")
    .innerHTML += row;

    document.getElementById("password").value = "";
}
</script>

</body>
</html>
